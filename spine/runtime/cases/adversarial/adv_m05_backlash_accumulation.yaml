problem:
  name: "Backlash accumulation over 1000 cycles"
  domain: "robotic_design"

constraints:
  - "initial_backlash: 0.05mm"
  - "backlash_per_cycle: 0.0001mm"
  - "total_cycles: 1000"
  - "max_acceptable_backlash: 0.2mm"
  - "must_maintain_precision"

uncertainties:
  - "wear_rate_variability: ±50%"
  - "lubrication_effectiveness: variable"
  - "load_dependent_wear: unknown"

objectives:
  - "positioning_accuracy"
  - "long_term_precision"

design:
  initial_backlash_mm: 0.05
  wear_per_cycle_mm: 0.0001
  cycles: 1000
  accumulated_backlash_mm: 0.15
  max_backlash_mm: 0.2
  margin_mm: 0.05

metadata:
  injected_failure: "backlash_accumulation"
  failure_category: "mechanical"
  expected_detection: "May be detected as geometric or precision issue"

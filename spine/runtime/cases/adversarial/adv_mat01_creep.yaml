problem:
  name: "Creep at elevated temperature - 0.8 Tm"
  domain: "robotic_design"

constraints:
  - "operating_temp: 0.8 × melting_temp"
  - "melting_temp: 200°C"
  - "operating_temp: 160°C"
  - "creep_strain_rate: 0.001/hour"
  - "must_withstand_long_term"

uncertainties:
  - "creep_life_prediction: variable"
  - "temperature_variation: ±10°C"
  - "stress_acceleration: unknown"

objectives:
  - "long_term_stability"
  - "material_integrity"

design:
  melting_temp_c: 200
  operating_temp_c: 160
  temp_ratio: 0.8
  creep_strain_rate_per_hour: 0.001
  expected_life_hours: 1000
  # For FORMAL_029 (creep_envelope) and FORMAL_030 (thermal_material_coupling)
  sustained_stress_mpa: 450
  yield_strength_mpa: 1000
  max_service_temp_c: 200
  exposure_hours: 8760
  creep_threshold_mpa: 400

metadata:
  injected_failure: "creep_deformation"
  failure_category: "material"
  expected_detection: "Material degradation risk may be detected"

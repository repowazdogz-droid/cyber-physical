  - "wet_friction_coefficient: 0.3"
  - "required_friction: 0.4"
  - "grip_force: 5.0N"
  - "must_not_slip"

uncertainties:
  - "surface_wetness_variation: high"
  - "friction_degradation_rate: unknown"
  - "slip_detection: variable"

objectives:
  - "secure_grasping"
  - "friction_management"

design:
  dry_friction_coeff: 0.6
  wet_friction_coeff: 0.3

problem:
  name: "Clearance reduction under load deflection"
  domain: "robotic_design"

constraints:
  - "nominal_clearance: 2.0mm"
  - "deflection_under_load: 1.5mm"
  - "remaining_clearance: 0.5mm"
  - "min_required_clearance: 1.0mm"
  - "must_maintain_clearance"

uncertainties:
  - "load_variation: ±20%"
  - "deflection_model_accuracy: variable"
  - "dynamic_effects: unknown"

objectives:
  - "collision_avoidance"
  - "structural_clearance"

design:
  nominal_clearance_mm: 2.0
  deflection_mm: 1.5
  remaining_clearance_mm: 0.5
  min_clearance_mm: 1.0
  violation_mm: -0.5
  # For deflection constraint
  applied_force_n: 20
  beam_length_mm: 200
  EI_nmm2: 8000
  initial_clearance_mm: 2.0

metadata:
  injected_failure: "clearance_reduction"
  failure_category: "geometric"
  expected_detection: "Min clearance constraint should trigger"

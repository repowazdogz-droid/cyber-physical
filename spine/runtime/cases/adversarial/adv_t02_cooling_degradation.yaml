problem:
  name: "Cooling degradation - fan failure at 80% load"
  domain: "robotic_design"

constraints:
  - "normal_power: 40W"
  - "cooling_factor: 0.3 (with fan)"
  - "cooling_factor_degraded: 1.0 (fan failure)"
  - "thermal_capacity: 50W"
  - "must_maintain_cooling"

uncertainties:
  - "fan_reliability: unknown"
  - "degradation_timeline: variable"
  - "backup_cooling: none"

objectives:
  - "thermal_safety"
  - "reliability"

design:
  power_w: 40
  cooling_factor_normal: 0.3
  cooling_factor_degraded: 1.0
  thermal_risk_normal: 12.0
  thermal_risk_degraded: 40.0
  thermal_capacity_w: 50
  estimated_temp_rise_c: 68

metadata:
  injected_failure: "cooling_degradation"
  failure_category: "thermal"
  expected_detection: "Thermal constraint should trigger with degraded cooling"

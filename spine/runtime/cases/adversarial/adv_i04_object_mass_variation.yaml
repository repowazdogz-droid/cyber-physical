problem:
  name: "Object mass varies ±40% from expected"
  domain: "robotic_design"

constraints:
  - "expected_mass: 1.0kg"
  - "actual_mass_range: 0.6-1.4kg"
  - "variation: ±40%"
  - "payload_capacity: 1.5kg"
  - "must_handle_variation"

uncertainties:
  - "mass_measurement_accuracy: variable"
  - "dynamic_load_impact: unknown"
  - "control_adaptation: variable"

objectives:
  - "payload_handling"
  - "mass_estimation"

design:
  expected_mass_kg: 1.0
  min_mass_kg: 0.6
  max_mass_kg: 1.4
  variation_percent: 40
  payload_capacity_kg: 1.5
  utilization_at_max: 0.93
  # For FORMAL_031 (contact_pressure) and FORMAL_032 (tissue_crush_risk)
  contact_force_n: 13.7
  contact_area_mm2: 20.0
  tissue_tolerance_mpa: 0.5
  contact_duration_s: 1.5
  pressure_limit_mpa: 1.0

metadata:
  injected_failure: "object_mass_variation"
  failure_category: "interaction"
  expected_detection: "Mass/payload constraint may trigger at high end"

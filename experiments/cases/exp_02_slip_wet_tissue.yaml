problem:
  name: "Slip experiment: wet tissue surface, 1N normal force"
  domain: "surgical_robotics"

constraints:
  - "normal_force: 1N"
  - "must_not_slip"
  - "friction_coefficient: 0.4"

uncertainties:
  - "tissue_wetness: variable"

objectives:
  - "gentle_grip"

design:
  normal_force_n: 1.0
  friction_coefficient: 0.4
  surface_type: "tissue"

metadata:
  experiment_type: "slip"

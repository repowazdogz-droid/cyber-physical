problem:
  name: "Fatigue experiment: 100 cycles with overload spikes"
  domain: "surgical_robotics"

constraints:
  - "cycles: 100"
  - "load: 5N"
  - "overload_spikes: 12N"
  - "must_not_fail"

uncertainties:
  - "overload_damage: unknown"

objectives:
  - "overload_tolerance"

design:
  cycles: 100
  load_n: 5.0
  material: "silicone"
  overload_spikes_n: 12.0

metadata:
  experiment_type: "fatigue"

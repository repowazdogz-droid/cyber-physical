problem:
  name: "Thermal experiment: continuous operation 30min, no cooling"
  domain: "surgical_robotics"

constraints:
  - "duration: 1800s"
  - "power: 12W"
  - "must_not_overheat"
  - "max_temp: 65°C"

uncertainties:
  - "thermal_buildup: unknown"

objectives:
  - "extended_operation"

design:
  power_w: 12.0
  duty_cycle: 1.0
  duration_s: 1800
  cooling: "none"

metadata:
  experiment_type: "thermal"

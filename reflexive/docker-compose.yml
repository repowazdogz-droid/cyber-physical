version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: reflexive-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: reflexive
      POSTGRES_DB: reflexive
    volumes:
      - reflexive-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  reflexive-postgres-data:
